name: Daily Energy Dashboard - Daily Data Pipeline

on:
  schedule:
    # 매일 한국시간 08:10 실행 = UTC 23:10
    - cron: "10 23 * * *"

  workflow_dispatch:
    inputs:
      target_date:
        description: "수집/재생성할 날짜(YYYY-MM-DD). 비워두면 실행일 기준"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-energy-dashboard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-data-pipeline:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Seoul
      OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git pull --ff-only origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Check required files
        run: |
          echo "현재 저장소 파일 목록:"
          ls -la
          echo "scripts 폴더:"
          ls -la scripts || true

          test -f scripts/fetch_safetimes_schedule.py || (echo "ERROR: scripts/fetch_safetimes_schedule.py 파일이 없습니다." && exit 1)
          test -f scripts/build_report_draft_from_schedule.py || (echo "ERROR: scripts/build_report_draft_from_schedule.py 파일이 없습니다." && exit 1)
          test -f scripts/fetch_opinet_international_prices.py || (echo "ERROR: scripts/fetch_opinet_international_prices.py 파일이 없습니다." && exit 1)
          test -f scripts/merge_prices_into_report.py || (echo "ERROR: scripts/merge_prices_into_report.py 파일이 없습니다." && exit 1)
          test -f scripts/generate_html_report.py || (echo "ERROR: scripts/generate_html_report.py 파일이 없습니다." && exit 1)
          test -f scripts/generate_report_index.py || (echo "ERROR: scripts/generate_report_index.py 파일이 없습니다." && exit 1)
          test -f report_sample.json || (echo "ERROR: report_sample.json 파일이 저장소 첫 화면에 없습니다." && exit 1)

      - name: Decide target date
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "TARGET_DATE=${{ github.event.inputs.target_date }}" >> $GITHUB_ENV
          else
            echo "TARGET_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - name: Show target date
        run: |
          echo "TARGET_DATE=$TARGET_DATE"

      - name: Check existing report draft
        run: |
          if [ -f "data/reports/$TARGET_DATE.report.json" ]; then
            echo "REPORT_EXISTS=true" >> $GITHUB_ENV
            echo "[OK] 기존 리포트 JSON 발견: data/reports/$TARGET_DATE.report.json"
            echo "[INFO] 세이프타임즈 수집과 리포트 초안 생성을 건너뛰고, 가격/HTML/인덱스만 재생성합니다."
          else
            echo "REPORT_EXISTS=false" >> $GITHUB_ENV
            echo "[INFO] 기존 리포트 JSON이 없습니다. 세이프타임즈 수집부터 진행합니다."
          fi

      - name: Fetch SafeTimes schedule
        if: env.REPORT_EXISTS != 'true'
        run: |
          python scripts/fetch_safetimes_schedule.py \
            --date "$TARGET_DATE" \
            --out-dir data/schedules \
            --max-retries 1 \
            --retry-delay 10

      - name: Build report draft JSON from SafeTimes
        if: env.REPORT_EXISTS != 'true'
        run: |
          python scripts/build_report_draft_from_schedule.py \
            --date "$TARGET_DATE" \
            --schedule-dir data/schedules \
            --base-report report_sample.json \
            --out-dir data/reports

      - name: Fetch Opinet international prices
        run: |
          if [ -f "data/prices/$TARGET_DATE.json" ]; then
            echo "[OK] 기존 오피넷 가격 JSON 발견: data/prices/$TARGET_DATE.json"
            echo "[INFO] 기존 가격 파일을 우선 사용합니다."
          else
            python scripts/fetch_opinet_international_prices.py \
              --date "$TARGET_DATE" \
              --out-dir data/prices
          fi

      - name: Merge Opinet prices into report draft
        run: |
          python scripts/merge_prices_into_report.py \
            --date "$TARGET_DATE" \
            --report-dir data/reports \
            --price-dir data/prices \
            --history data/prices/history.json \
            --chart-months 2

      - name: Generate HTML report
        run: |
          python scripts/generate_html_report.py \
            --date "$TARGET_DATE" \
            --report-dir data/reports \
            --out-dir docs/reports

      - name: Generate report index
        run: |
          python scripts/generate_report_index.py \
            --reports-dir docs/reports \
            --out docs/report-index.json

      - name: Show generated files
        run: |
          echo "생성된 파일:"
          find data -maxdepth 3 -type f || true
          find docs -maxdepth 3 -type f || true

      - name: Commit collected data and dashboard files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/schedules/ || true
          git add data/reports/ || true
          git add data/prices/ || true
          git add docs/index.html || true
          git add docs/reports/ || true
          git add docs/report-index.json || true

          if git diff --cached --quiet; then
            echo "변경된 파일이 없습니다. 커밋하지 않습니다."
            exit 0
          fi

          git commit -m "Update daily dashboard report $TARGET_DATE"

          if git push; then
            echo "정상적으로 push 완료"
            exit 0
          fi

          echo "push가 거절되었습니다. 원격 저장소 최신 내용을 기준으로 다시 커밋합니다."

          git fetch origin main
          git reset --soft origin/main

          git add data/schedules/ || true
          git add data/reports/ || true
          git add data/prices/ || true
          git add docs/index.html || true
          git add docs/reports/ || true
          git add docs/report-index.json || true

          if git diff --cached --quiet; then
            echo "최신 원격 기준으로 보니 추가 변경이 없습니다."
            exit 0
          fi

          git commit -m "Update daily dashboard report $TARGET_DATE"
          git push
