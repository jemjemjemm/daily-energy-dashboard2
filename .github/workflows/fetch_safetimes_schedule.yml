name: Daily Energy Dashboard - SafeTimes Schedule

on:
  schedule:
    # 매일 한국시간 08:05 실행 = UTC 23:05
    - cron: "5 23 * * *"

  workflow_dispatch:
    inputs:
      target_date:
        description: "수집할 날짜(YYYY-MM-DD). 비워두면 실행일 기준"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  fetch-and-build-draft:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Decide target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "TARGET_DATE=${{ github.event.inputs.target_date }}" >> $GITHUB_ENV
          else
            echo "TARGET_DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - name: Fetch SafeTimes schedule
        run: |
          python scripts/fetch_safetimes_schedule.py \
            --date "$TARGET_DATE" \
            --out-dir data/schedules \
            --max-retries 3 \
            --retry-delay 300

      - name: Build report draft JSON
        run: |
          python scripts/build_report_draft_from_schedule.py \
            --date "$TARGET_DATE" \
            --schedule-dir data/schedules \
            --base-report report_sample.json \
            --out-dir data/reports

      - name: Commit collected data and report draft
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/schedules/
          git add data/reports/

          git diff --cached --quiet || git commit -m "Add SafeTimes schedule and report draft $TARGET_DATE"
          git push
