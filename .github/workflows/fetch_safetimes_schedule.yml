name: Daily Energy Dashboard - SafeTimes Schedule

on:
  schedule:
    # 매일 한국시간 08:05 실행 = UTC 23:05
    - cron: "5 23 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "수집할 날짜(YYYY-MM-DD). 비워두면 실행일 기준"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  fetch-safetimes:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch SafeTimes schedule
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python scripts/fetch_safetimes_schedule.py --date "${{ github.event.inputs.target_date }}" --out-dir data/schedules --max-retries 3 --retry-delay 300
          else
            python scripts/fetch_safetimes_schedule.py --out-dir data/schedules --max-retries 3 --retry-delay 300
          fi

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedules/
          git diff --cached --quiet || git commit -m "Add SafeTimes schedule data $(TZ=Asia/Seoul date +%Y-%m-%d)"
          git push
