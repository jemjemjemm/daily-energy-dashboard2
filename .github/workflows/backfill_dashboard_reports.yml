name: Backfill Dashboard Reports

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: "생성 시작일(YYYY-MM-DD). 예: 2026-03-01"
        required: true
        default: "2026-03-01"
      date_to:
        description: "생성 종료일(YYYY-MM-DD). 예: 2026-05-21"
        required: true
        default: "2026-05-21"
      scan_start:
        description: "세이프타임즈 기사번호 스캔 시작값"
        required: false
        default: "239000"
      scan_end:
        description: "세이프타임즈 기사번호 스캔 종료값"
        required: false
        default: "243500"

permissions:
  contents: write

concurrency:
  group: backfill-dashboard-reports-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill-dashboard-reports:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Seoul

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git pull --ff-only origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Validate required base files
        run: |
          set -e
          test -f scripts/merge_prices_into_report.py || (echo "ERROR: scripts/merge_prices_into_report.py 없음" && exit 1)
          test -f scripts/generate_html_report.py || (echo "ERROR: scripts/generate_html_report.py 없음" && exit 1)
          test -f scripts/generate_report_index.py || (echo "ERROR: scripts/generate_report_index.py 없음" && exit 1)
          test -f data/prices/history.json || (echo "ERROR: data/prices/history.json 없음" && exit 1)
          grep -q "주요 출처" scripts/generate_html_report.py || (echo "ERROR: generate_html_report.py가 최신 화면 형식이 아닙니다." && exit 1)

      - name: Create direct safetimes backfill runner
        run: |
          cat > /tmp/backfill_reports.py <<'PY'
          #!/usr/bin/env python3
          # -*- coding: utf-8 -*-

          from __future__ import annotations

          import argparse
          import json
          import re
          import subprocess
          import sys
          import tempfile
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from datetime import datetime, timedelta
          from pathlib import Path
          from typing import Any, Dict, Iterable, List, Optional

          import requests
          from bs4 import BeautifulSoup

          BASE_URL = "https://www.safetimes.co.kr"
          ARTICLE_URL = BASE_URL + "/news/articleView.html?idxno={idxno}"
          USER_AGENT = (
              "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
              "AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0 Safari/537.36"
          )

          # 실제 확인된 주요 날짜 기사번호. 스캔 실패 시 안전장치로 직접 확인.
          KNOWN_IDX_BY_DATE = {
              "2026-03-03": 240078,
              "2026-04-01": 241384,
              "2026-05-04": 242478,
              "2026-05-06": 242506,
              "2026-05-08": 242586,
              "2026-05-12": 242687,
              "2026-05-18": 242809,
              "2026-05-19": 242840,
          }

          ENERGY_KEYWORDS = [
              "산업부", "산업통상부", "기후부", "기후에너지환경부", "에너지", "석유",
              "정유", "석화", "석유화학", "LNG", "가스", "전력", "통상", "관세",
              "중동", "원유", "공정위", "금융위", "재경부", "기획처", "중기부",
              "탄소", "ESS", "국무회의", "비상경제", "경제", "국회", "토론회"
          ]

          ORG_PATTERNS = [
              "산업부", "산업통상부", "기후부", "기후에너지환경부", "재경부", "기획처",
              "공정위", "금융위", "중기부", "국회", "대통령", "총리", "과기정통부",
              "국토부", "농식품부", "노동부", "환경부", "통상"
          ]


          def parse_args():
              parser = argparse.ArgumentParser(description="Direct SafeTimes backfill runner")
              parser.add_argument("--start", required=True)
              parser.add_argument("--end", required=True)
              parser.add_argument("--scan-start", type=int, required=True)
              parser.add_argument("--scan-end", type=int, required=True)
              parser.add_argument("--scan-workers", type=int, default=24)
              return parser.parse_args()


          def atomic_write_json(path: Path, payload: Dict[str, Any]) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              text = json.dumps(payload, ensure_ascii=False, indent=2)
              with tempfile.NamedTemporaryFile("w", encoding="utf-8", dir=str(path.parent), delete=False,
                                               prefix=f".{path.name}.", suffix=".tmp") as tmp:
                  tmp.write(text)
                  tmp_path = Path(tmp.name)
              tmp_path.replace(path)


          def normalize_text(value: str) -> str:
              return re.sub(r"\s+", " ", value or "").strip()


          def date_range(start: str, end: str):
              s = datetime.strptime(start, "%Y-%m-%d").date()
              e = datetime.strptime(end, "%Y-%m-%d").date()
              if s > e:
                  raise ValueError("start가 end보다 늦습니다.")
              cur = s
              while cur <= e:
                  yield cur
                  cur += timedelta(days=1)


          def weekday_dates(start: str, end: str) -> List[str]:
              return [d.isoformat() for d in date_range(start, end) if d.weekday() < 5]


          def display_date(date_text: str) -> str:
              d = datetime.strptime(date_text, "%Y-%m-%d").date()
              weekdays = ["월", "화", "수", "목", "금", "토", "일"]
              return f"{d.month}/{d.day}({weekdays[d.weekday()]})"


          def previous_label(date_text: str) -> str:
              d = datetime.strptime(date_text, "%Y-%m-%d").date() - timedelta(days=1)
              weekdays = ["월", "화", "수", "목", "금", "토", "일"]
              return f"{d.month}/{d.day}({weekdays[d.weekday()]})"


          def fetch_html(idxno: int, timeout: int = 12) -> Optional[str]:
              url = ARTICLE_URL.format(idxno=idxno)
              headers = {
                  "User-Agent": USER_AGENT,
                  "Accept-Language": "ko-KR,ko;q=0.9,en-US;q=0.8",
                  "Referer": BASE_URL,
              }
              try:
                  resp = requests.get(url, headers=headers, timeout=timeout)
                  if resp.status_code != 200:
                      return None
                  if resp.apparent_encoding:
                      resp.encoding = resp.apparent_encoding
                  elif not resp.encoding:
                      resp.encoding = "utf-8"
                  text = resp.text
                  if "오늘의 주요일정" not in text and "오늘의 주요 일정" not in text:
                      return None
                  return text
              except Exception:
                  return None


          def extract_meta(idxno: int, html: str) -> Optional[Dict[str, Any]]:
              soup = BeautifulSoup(html, "html.parser")
              title = ""
              for selector in ["h1", "meta[property='og:title']", "title"]:
                  node = soup.select_one(selector)
                  if not node:
                      continue
                  if node.name == "meta":
                      title = normalize_text(node.get("content", ""))
                  else:
                      title = normalize_text(node.get_text(" ", strip=True))
                  if "오늘의 주요일정" in title or "오늘의 주요 일정" in title:
                      break

              if "오늘의 주요일정" not in title and "오늘의 주요 일정" not in title:
                  return None

              text_all = soup.get_text("\n", strip=True)
              approved_match = re.search(r"(?:기사승인|승인|입력)\s+(\d{4})\.(\d{2})\.(\d{2})", text_all)
              if not approved_match:
                  approved_match = re.search(r"(\d{4})\.(\d{2})\.(\d{2})\s+\d{2}:\d{2}", text_all)
              if not approved_match:
                  return None

              approved_date = f"{approved_match.group(1)}-{approved_match.group(2)}-{approved_match.group(3)}"
              day_match = re.search(r"주요\s*일정[·ㆍ\- ]+(\d{1,2})일", title)
              title_day = int(day_match.group(1)) if day_match else None

              if title_day and title_day != int(approved_date[-2:]):
                  return None

              raw_text = extract_body_text_from_soup(soup)

              return {
                  "idxno": idxno,
                  "url": ARTICLE_URL.format(idxno=idxno),
                  "title": title,
                  "approved_date": approved_date,
                  "title_day": title_day,
                  "raw_text": raw_text,
              }


          def extract_body_text_from_soup(soup: BeautifulSoup) -> str:
              body_node = (
                  soup.select_one("#article-view-content-div")
                  or soup.select_one(".article-view-content")
                  or soup.select_one("article")
                  or soup.select_one(".user-content")
              )
              if body_node:
                  raw_text = body_node.get_text("\n", strip=True)
              else:
                  raw_text = soup.get_text("\n", strip=True)
              return re.sub(r"\n{3,}", "\n\n", raw_text).strip()


          def scan_articles(scan_start: int, scan_end: int, workers: int, target_dates: Iterable[str]) -> Dict[str, Dict[str, Any]]:
              target_set = set(target_dates)
              found: Dict[str, Dict[str, Any]] = {}

              for date_text, idxno in KNOWN_IDX_BY_DATE.items():
                  if date_text not in target_set:
                      continue
                  html = fetch_html(idxno)
                  meta = extract_meta(idxno, html) if html else None
                  if meta and meta["approved_date"] == date_text:
                      found[date_text] = meta
                      print(f"[FOUND-KNOWN] {date_text}: idxno={idxno}, title={meta['title']}")
                  else:
                      print(f"[WARN] known idx 확인 실패: {date_text} idxno={idxno}")

              ids = list(range(scan_start, scan_end + 1))
              print(f"[INFO] 세이프타임즈 기사번호 스캔: {scan_start}~{scan_end} ({len(ids)}건)")

              with ThreadPoolExecutor(max_workers=max(1, workers)) as executor:
                  future_map = {executor.submit(fetch_html, idxno): idxno for idxno in ids}
                  for future in as_completed(future_map):
                      idxno = future_map[future]
                      html = future.result()
                      if not html:
                          continue
                      meta = extract_meta(idxno, html)
                      if not meta:
                          continue
                      approved_date = meta["approved_date"]
                      if approved_date not in target_set:
                          continue
                      existing = found.get(approved_date)
                      if not existing or idxno > existing["idxno"]:
                          found[approved_date] = meta
                          print(f"[FOUND] {approved_date}: idxno={idxno}, title={meta['title']}")

              print(f"[INFO] 세이프타임즈 주요일정 발견: {len(found)}건")
              return found


          def schedule_items_from_text(raw_text: str) -> List[Dict[str, str]]:
              lines = [normalize_text(line) for line in raw_text.splitlines()]
              lines = [line for line in lines if line]
              items: List[Dict[str, str]] = []
              current_org = ""

              for line in lines:
                  # 기관/분야 헤더
                  if line.startswith("[") and line.endswith("]"):
                      current_org = line.strip("[]")
                      continue
                  if line.startswith("▲"):
                      clean = line.lstrip("▲").strip()
                      org = current_org
                      for pattern in ORG_PATTERNS:
                          if clean.startswith(pattern):
                              org = pattern
                              clean = clean[len(pattern):].strip(" ,")
                              break
                      if any(k in (org + " " + clean) for k in ENERGY_KEYWORDS):
                          items.append({
                              "time": extract_time(clean),
                              "org": org or "주요일정",
                              "title": clean,
                              "relevance": "정유·석화·LNG 관련 정책·경제·산업 일정으로 분류"
                          })
                      continue

                  # 직전 기관이 에너지/경제 관련이면 다음 줄도 일정으로 취급
                  if current_org and any(k in current_org + " " + line for k in ENERGY_KEYWORDS):
                      items.append({
                          "time": extract_time(line),
                          "org": current_org,
                          "title": line,
                          "relevance": "정유·석화·LNG 관련 정책·경제·산업 일정으로 분류"
                      })

              # 너무 적으면 경제/산업/정책 관련 라인을 추가 보강
              if len(items) < 5:
                  for line in lines:
                      if any(k in line for k in ENERGY_KEYWORDS) and len(line) > 8:
                          item = {
                              "time": extract_time(line),
                              "org": guess_org(line),
                              "title": line.lstrip("▲").strip(),
                              "relevance": "키워드 기반 보강 일정"
                          }
                          if item["title"] and all(existing["title"] != item["title"] for existing in items):
                              items.append(item)

              return items[:20]


          def extract_time(text: str) -> str:
              m = re.search(r"(\d{1,2}:\d{2})", text)
              return m.group(1) if m else "-"


          def guess_org(text: str) -> str:
              for org in ORG_PATTERNS:
                  if org in text:
                      return org
              return "주요일정"


          def issue_items_from_schedule(schedule_items: List[Dict[str, str]]) -> List[Dict[str, str]]:
              issues = []
              for item in schedule_items[:6]:
                  issues.append({
                      "category": "주요일정",
                      "title": item["title"],
                      "description": item["relevance"],
                      "grade": "B 주시"
                  })
              return issues or [{
                  "category": "데이터",
                  "title": "정유·석화·LNG 직접 관련 주요 일정 제한적",
                  "description": "세이프타임즈 원문은 확인했으나, 키워드 기준 직접 관련 일정이 제한적입니다.",
                  "grade": "C 참고"
              }]


          def write_schedule_json(date_text: str, meta: Dict[str, Any]) -> None:
              payload = {
                  "schema_version": "3.0",
                  "source": "세이프타임즈",
                  "category": "오늘의 주요일정",
                  "date": date_text,
                  "title": meta["title"],
                  "article_title": meta["title"],
                  "article_url": meta["url"],
                  "article_idxno": meta["idxno"],
                  "approved_date": meta["approved_date"],
                  "collected_at": datetime.now().strftime("%Y-%m-%d %H:%M:%S KST"),
                  "items": [{"text": item["title"], **item} for item in schedule_items_from_text(meta["raw_text"])],
                  "raw_text": meta["raw_text"],
                  "success": True,
              }
              atomic_write_json(Path("data/schedules") / f"{date_text}.json", payload)


          def build_report_json(date_text: str, meta: Optional[Dict[str, Any]]) -> Dict[str, Any]:
              if meta:
                  schedule_items = schedule_items_from_text(meta["raw_text"])
                  issues = issue_items_from_schedule(schedule_items)
                  summary_text = (
                      f"세이프타임즈 '{meta['title']}' 원문을 기준으로 정유·석화·LNG 관련성이 있는 "
                      f"정책·경제·산업 일정을 선별함."
                  )
                  article_url = meta["url"]
                  article_title = meta["title"]
                  source_name = "세이프타임즈 오늘의 주요일정"
              else:
                  schedule_items = [{
                      "time": "-",
                      "org": "데이터",
                      "title": "세이프타임즈 주요일정 원문을 자동 확인하지 못했습니다.",
                      "relevance": "해당 날짜는 가격 데이터 중심으로 표시합니다."
                  }]
                  issues = [{
                      "category": "데이터",
                      "title": "주요일정 원문 데이터 미확보",
                      "description": "세이프타임즈 기사 자동 매칭 실패로 일정 기반 해석은 보류했습니다.",
                      "grade": "C 참고"
                  }]
                  summary_text = "세이프타임즈 원문 자동 매칭 실패로 가격 데이터 중심 리포트로 생성했습니다."
                  article_url = ""
                  article_title = "세이프타임즈 원문 자동 매칭 실패"
                  source_name = "세이프타임즈"

              return {
                  "report": {
                      "report_title": "Daily Issue Report",
                      "header_title": "Daily Issue Report",
                      "report_badge": "정유 · 석유화학 · LNG",
                      "report_date": date_text,
                      "display_date": display_date(date_text),
                      "previous_day_label": previous_label(date_text),
                      "today_label": display_date(date_text),
                      "generated_at": datetime.now().strftime("%Y-%m-%d %H:%M:%S KST"),
                      "report_version": "safetimes-direct-v1.0",
                      "review_status": "자동생성 초안",
                  },
                  "summary": [
                      {"type": "schedule", "text": summary_text},
                      {"type": "price", "text": "가격 카드와 그래프는 history.json 및 오피넷 가격 데이터를 기준으로 병합합니다."},
                      {"type": "review", "text": "일정 관련성 평가는 키워드 기반 자동 분류이므로 최종 보고 전 확인이 필요합니다."}
                  ],
                  "issues": issues,
                  "schedules": schedule_items,
                  "news_trend": {
                      "summary": f"대표 출처는 {source_name}입니다. 기사 제목: {article_title}",
                      "articles": [{
                          "title": article_title,
                          "press": "세이프타임즈",
                          "url": article_url
                      }]
                  },
                  "quality_control": {
                      "quality_notes": [
                          "세이프타임즈 주요일정 원문 기반 자동 생성",
                          "정유·석화·LNG 관련성은 키워드 기반 자동 분류"
                      ],
                      "sources": [
                          {"name": source_name, "type": "schedule", "url": article_url},
                          {"name": "장기 가격 이력 history.json", "type": "price-history", "url": ""},
                          {"name": "오피넷 국제유가", "type": "price", "url": "https://www.opinet.co.kr/"}
                      ]
                  },
                  "automation": {
                      "safetimes_direct": {
                          "created_at": datetime.now().strftime("%Y-%m-%d %H:%M:%S KST"),
                          "article_idxno": meta["idxno"] if meta else "",
                          "script": "backfill_reports.py direct builder"
                      }
                  }
              }


          def run(cmd) -> None:
              print("[RUN]", " ".join(cmd))
              completed = subprocess.run(cmd, text=True)
              if completed.returncode != 0:
                  raise RuntimeError(f"명령 실패: {' '.join(cmd)}")


          def main() -> int:
              args = parse_args()
              target_dates = weekday_dates(args.start, args.end)
              found = scan_articles(args.scan_start, args.scan_end, args.scan_workers, target_dates)

              for date_text in target_dates:
                  print(f"\n=== {date_text} 리포트 직접 생성 ===")
                  meta = found.get(date_text)
                  if meta:
                      write_schedule_json(date_text, meta)
                  else:
                      print(f"[WARN] 세이프타임즈 기사 자동 매칭 실패: {date_text}")

                  report = build_report_json(date_text, meta)
                  atomic_write_json(Path("data/reports") / f"{date_text}.report.json", report)

                  run([
                      sys.executable, "scripts/merge_prices_into_report.py",
                      "--date", date_text,
                      "--report-dir", "data/reports",
                      "--price-dir", "data/prices",
                      "--history", "data/prices/history.json",
                      "--chart-months", "2",
                  ])

                  run([
                      sys.executable, "scripts/generate_html_report.py",
                      "--date", date_text,
                      "--report-dir", "data/reports",
                      "--out-dir", "docs/reports",
                  ])

              run([
                  sys.executable, "scripts/generate_report_index.py",
                  "--reports-dir", "docs/reports",
                  "--out", "docs/report-index.json",
              ])

              missing = [d for d in target_dates if d not in found]
              if missing:
                  print("[WARN] 세이프타임즈 자동 매칭 실패 날짜:", ", ".join(missing))
              print("[OK] 백필 완료")
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          PY

      - name: Run direct safetimes backfill
        run: |
          python /tmp/backfill_reports.py \
            --start "${{ github.event.inputs.date_from }}" \
            --end "${{ github.event.inputs.date_to }}" \
            --scan-start "${{ github.event.inputs.scan_start }}" \
            --scan-end "${{ github.event.inputs.scan_end }}" \
            --scan-workers 24

      - name: Verify generated outputs
        run: |
          set -e
          test -f docs/report-index.json || (echo "ERROR: docs/report-index.json 생성 실패" && exit 1)

          python - <<'PY'
          import json
          from pathlib import Path

          idx = json.loads(Path("docs/report-index.json").read_text(encoding="utf-8"))
          dates = set(idx.get("availableDates", []))

          required = {"2026-05-04", "2026-05-06", "2026-05-08", "2026-05-12", "2026-05-18", "2026-05-19", "2026-05-20", "2026-05-21"}
          missing = sorted(required - dates)
          if missing:
              raise SystemExit(f"ERROR: report-index.json에 필수 날짜 누락: {missing}")

          for d in ["2026-05-04", "2026-05-06", "2026-05-08", "2026-05-12", "2026-05-18", "2026-05-19"]:
              html_path = Path(f"docs/reports/{d}.html")
              if not html_path.exists():
                  raise SystemExit(f"ERROR: HTML 누락: {html_path}")
              html = html_path.read_text(encoding="utf-8", errors="ignore")
              if "<circle" in html:
                  raise SystemExit(f"ERROR: {d} 그래프에 circle 요소가 남아 있습니다.")
              if "상태:" in html or "버전:" in html:
                  raise SystemExit(f"ERROR: {d} 헤더에 상태/버전 문구가 남아 있습니다.")
              if "금일 주요 일정" not in html:
                  raise SystemExit(f"ERROR: {d} 금일 주요 일정 섹션 누락")
              if "주요 출처" not in html:
                  raise SystemExit(f"ERROR: {d} 주요 출처 섹션 누락")

          print("[OK] report-index와 HTML 검증 완료")
          PY

      - name: Commit backfilled reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/schedules/ || true
          git add data/reports/ || true
          git add docs/reports/ || true
          git add docs/report-index.json || true

          if git diff --cached --quiet; then
            echo "변경된 파일이 없습니다."
            exit 0
          fi

          git commit -m "Backfill dashboard reports ${{ github.event.inputs.date_from }} to ${{ github.event.inputs.date_to }}"

          if git push; then
            echo "정상적으로 push 완료"
            exit 0
          fi

          git fetch origin main
          git reset --soft origin/main

          git add data/schedules/ || true
          git add data/reports/ || true
          git add docs/reports/ || true
          git add docs/report-index.json || true

          if git diff --cached --quiet; then
            echo "최신 원격 기준으로 추가 변경이 없습니다."
            exit 0
          fi

          git commit -m "Backfill dashboard reports ${{ github.event.inputs.date_from }} to ${{ github.event.inputs.date_to }}"
          git push
