name: Backfill Dashboard Reports

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: "생성 시작일(YYYY-MM-DD). 예: 2026-05-01"
        required: true
        default: "2026-05-01"
      date_to:
        description: "생성 종료일(YYYY-MM-DD). 예: 2026-05-22"
        required: true
        default: "2026-05-22"

permissions:
  contents: write

concurrency:
  group: backfill-dashboard-reports-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill-dashboard-reports:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git pull --ff-only origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Generate weekday reports for range
        run: |
          python scripts/generate_reports_range.py \
            --start "${{ github.event.inputs.date_from }}" \
            --end "${{ github.event.inputs.date_to }}" \
            --skip-weekends \
            --skip-korean-holidays \
            --report-dir data/reports \
            --schedule-dir data/schedules \
            --news-dir data/news \
            --price-dir data/prices \
            --history data/prices/history.json \
            --html-dir docs/reports \
            --index-out docs/report-index.json \
            --base-report report_sample.json \
            --chart-months 2 \
            --max-pages 80

      - name: Commit backfilled reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/schedules/ data/news/ data/reports/ data/prices/ docs/reports/ docs/report-index.json || true

          if git diff --cached --quiet; then
            echo "변경된 파일이 없습니다."
            exit 0
          fi

          git commit -m "Backfill dashboard reports"
          git push
