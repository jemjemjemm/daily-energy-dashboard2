name: Sync Published Dashboard Files

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Daily Energy Dashboard - Daily Data Pipeline"
      - "Backfill Dashboard Reports"
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: sync-published-dashboard-files-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-published-dashboard-files:
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Sync latest main
        run: |
          git pull --ff-only origin main

      - name: Remove unindexed stale report HTML
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          idx_path = Path("docs/report-index.json")
          reports_dir = Path("docs/reports")

          if not idx_path.exists() or not reports_dir.exists():
              raise SystemExit("ERROR: docs/report-index.json 또는 docs/reports 없음")

          idx = json.loads(idx_path.read_text(encoding="utf-8"))
          keep = set()
          for item in idx.get("reports", []):
              url = item.get("url", "")
              if url.startswith("reports/") and url.endswith(".html"):
                  keep.add(Path(url).name)

          removed = []
          for html in reports_dir.glob("*.html"):
              if html.name not in keep:
                  removed.append(html.name)
                  html.unlink()

          print(f"[OK] unindexed stale HTML removed: {len(removed)}")
          if removed:
              print("\n".join(sorted(removed)[:80]))
          PY

      - name: Validate docs output
        run: |
          set -e
          test -f docs/index.html || (echo "ERROR: docs/index.html 없음" && exit 1)
          test -f docs/report-index.json || (echo "ERROR: docs/report-index.json 없음" && exit 1)
          test -d docs/reports || (echo "ERROR: docs/reports 폴더 없음" && exit 1)

          DOC_REPORT_COUNT=$(find docs/reports -maxdepth 1 -type f -name "*.html" | wc -l | tr -d ' ')
          echo "docs reports count: $DOC_REPORT_COUNT"

          if [ "$DOC_REPORT_COUNT" -lt 10 ]; then
            echo "ERROR: docs/reports HTML 파일 수가 너무 적습니다. 백필 결과를 먼저 확인하세요."
            exit 1
          fi

          python - <<'PY'
          import json
          from pathlib import Path

          bad = [
              "자동 추출된 일정 항목이 없습니다",
              "본문 구조 확인 및 수동 검수가 필요합니다",
              "원문 자동 매칭 실패",
              "주요일정 원문 데이터 미확보",
              "가격 데이터 중심 리포트",
              "정유·석유화학·LNG 관련 조간 기사 후보를 찾지 못했습니다",
              "자동 수집된 대표 기사 없음",
              "일정 관련성 평가는",
              "A 직접",
              "B 간접",
              "C 참고",
              "세이프타임즈",
          ]
          idx = json.loads(Path("docs/report-index.json").read_text(encoding="utf-8"))
          dates = set(idx.get("availableDates", []))
          for item in idx.get("reports", []):
              d = item.get("date")
              p = Path("docs") / item.get("url", "")
              if not p.exists():
                  raise SystemExit(f"ERROR: report-index 날짜의 HTML 누락: {d} {p}")
              html = p.read_text(encoding="utf-8", errors="ignore")
              if any(x in html for x in bad):
                  raise SystemExit(f"ERROR: 내부 오류/fallback 문구가 노출된 HTML: {p}")
          print(f"[OK] docs 산출물 검증 완료: {len(dates)}개")
          PY

      - name: Mirror docs to public
        run: |
          set -e
          rm -rf public
          mkdir -p public
          cp -a docs/. public/

          echo "public 파일 동기화 완료"
          echo "public reports count:"
          find public/reports -maxdepth 1 -type f -name "*.html" | wc -l

      - name: Verify public output
        run: |
          set -e
          test -f public/index.html || (echo "ERROR: public/index.html 없음" && exit 1)
          test -f public/report-index.json || (echo "ERROR: public/report-index.json 없음" && exit 1)
          test -d public/reports || (echo "ERROR: public/reports 폴더 없음" && exit 1)

          python - <<'PY'
          import json
          from pathlib import Path

          docs_idx = json.loads(Path("docs/report-index.json").read_text(encoding="utf-8"))
          public_idx = json.loads(Path("public/report-index.json").read_text(encoding="utf-8"))

          docs_dates = set(docs_idx.get("availableDates", []))
          public_dates = set(public_idx.get("availableDates", []))

          if docs_dates != public_dates:
              raise SystemExit("ERROR: docs와 public의 availableDates가 다릅니다.")

          for item in public_idx.get("reports", []):
              p = Path("public") / item.get("url", "")
              if not p.exists():
                  raise SystemExit(f"ERROR: public HTML 누락: {p}")

          public_index = Path("public/index.html").read_text(encoding="utf-8", errors="ignore")
          if "리포트 바로가기" not in public_index:
              raise SystemExit("ERROR: public/index.html이 최신 대시보드 파일이 아닙니다.")

          print(f"[OK] public 산출물 검증 완료: {len(public_dates)}개")
          PY

      - name: Commit synced published files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/ docs/

          if git diff --cached --quiet; then
            echo "변경된 파일이 없습니다."
            exit 0
          fi

          git commit -m "Sync published dashboard files"
          git push
